name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Install tox
        run: pip install tox

      - name: Run tests via tox
        run: tox -e py

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install deps
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install setuptools pytest typing_extensions mypy

      - name: Run lint
        run: make lint
